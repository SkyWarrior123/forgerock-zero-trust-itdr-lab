# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Zero Trust Identity Platform
#
# Runs on every push to main and on all pull requests.
# Jobs:
#   1. lint-and-type-check — Python linting, type checking, JS linting
#   2. unit-tests          — Backend + threat detection unit tests
#   3. security-scan       — Trivy filesystem vulnerability scan
#   4. build-images        — Docker image build validation
#   5. integration-tests   — Integration tests against docker compose stack
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"
  REGISTRY:       ghcr.io
  IMAGE_PREFIX:   ${{ github.repository }}

jobs:

  # ── 1. Lint & Type Check ────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dev dependencies
        run: |
          pip install ruff mypy pydantic pydantic-settings fastapi httpx structlog redis geopy jwt

      - name: Ruff lint — backend
        run: ruff check backend/src/ tests/ --output-format=github

      - name: Ruff lint — threat detection
        run: ruff check threat-detection/app/ threat-detection/tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/src/ threat-detection/app/

      - name: MyPy type check — backend
        run: mypy backend/src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Non-blocking for now — add to blocking once stubs complete

      - name: MyPy type check — threat detection
        run: mypy threat-detection/app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: ESLint frontend
        run: cd frontend && npm run lint
        continue-on-error: true

  # ── 2. Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install threat detection dependencies
        run: pip install -r threat-detection/requirements.txt

      - name: Run threat detection unit tests
        run: |
          cd threat-detection
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -q
        env:
          REDIS_URL: ""  # Tests use in-memory fallback

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend unit tests
        run: |
          cd backend
          python -m pytest tests/ -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --tb=short \
            -q

      - name: Run security tests
        run: |
          pip install -r backend/requirements.txt
          python -m pytest tests/security/ -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: threat-detection/coverage.xml,backend/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ── 3. Security Scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0  # Non-blocking: report findings, don't fail build

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline 2>/dev/null || \
          detect-secrets scan . --all-files --only-allowlisted \
            --exclude-files '.*\.example$' \
            --exclude-files 'docs/.*'
        continue-on-error: true

  # ── 4. Build Docker Images ───────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: zt-backend:ci

      - name: Build threat detection image
        uses: docker/build-push-action@v5
        with:
          context: ./threat-detection
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: zt-threat-detection:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: zt-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
            VITE_AM_BASE_URL=http://localhost:8080/am

      - name: Scan built images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: zt-backend:ci
          format: table
          severity: CRITICAL
          exit-code: 0

  # ── 5. Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-images]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Start services via Docker Compose
        run: |
          docker compose up -d backend threat-detection redis am-stub
          sleep 20  # Allow services to warm up

      - name: Install test dependencies
        run: pip install pytest httpx pytest-asyncio

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'
          echo "Services are healthy"

      - name: Run integration tests
        run: |
          INTEGRATION_TESTS=1 python -m pytest \
            tests/integration/ \
            tests/functional/test_login_flow.py \
            -v --tb=short
        env:
          TEST_API_BASE: "http://localhost:8000"
          TEST_AM_BASE:  "http://localhost:8080/am"

      - name: Collect service logs on failure
        if: failure()
        run: docker compose logs